<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Survey</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
    color:white;

    background:
    radial-gradient(circle at top left,#ff6ec7 0%,transparent 35%),
    radial-gradient(circle at bottom right,#00f5ff 0%,transparent 35%),
    linear-gradient(135deg,#0f172a,#1e293b);
}

.home-btn{
    position:fixed;
    top:20px;
    left:20px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(10px);
    padding:10px 16px;
    border-radius:999px;
    z-index:20;
}

.card{
    width:100%;
    max-width:480px;
    padding:32px;
    border-radius:30px;
    text-align:center;
    background:rgba(255,255,255,.09);
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    box-shadow:0 25px 60px rgba(0,0,0,.35);
}

.badge{
    display:inline-block;
    padding:8px 15px;
    border-radius:999px;
    background:rgba(255,255,255,.12);
    color:#e5e7eb;
    font-size:13px;
    margin-bottom:20px;
}

h1{
    font-size:clamp(2rem,8vw,3.6rem);
    margin-bottom:10px;
}

.subtitle{
    color:#cbd5e1;
    margin-bottom:30px;
    line-height:1.5;
}

.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    min-height:150px;
}

button{
    border:none;
    cursor:pointer;
    padding:15px 34px;
    border-radius:999px;
    font-size:18px;
    font-weight:800;
    transition:.25s ease;
}

#yesBtn{
    background:linear-gradient(135deg,#22c55e,#86efac);
    color:#052e16;
    box-shadow:0 12px 35px rgba(34,197,94,.45);
    z-index:5;
}

#noBtn{
    background:rgba(255,255,255,.13);
    color:white;
    border:1px solid rgba(255,255,255,.25);
    z-index:6;
}

.progress-box{
    margin-top:20px;
    text-align:left;
}

.progress-text{
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:8px;
}

.progress{
    width:100%;
    height:10px;
    background:rgba(255,255,255,.12);
    border-radius:999px;
    overflow:hidden;
}

.progress-fill{
    width:0%;
    height:100%;
    background:linear-gradient(135deg,#22c55e,#a7f3d0);
    transition:.3s;
}

.warning{
    margin-top:18px;
    font-size:14px;
    color:#fda4af;
    min-height:22px;
}

.success{
    display:none;
}

.success .emoji{
    font-size:70px;
    margin-bottom:15px;
}

.success h1{
    color:#86efac;
}

.success p{
    color:#e5e7eb;
    line-height:1.6;
    font-size:18px;
}

.restart{
    margin-top:25px;
    background:rgba(255,255,255,.12);
    color:white;
    border:1px solid rgba(255,255,255,.2);
}

@media(max-width:500px){
    .card{
        padding:26px 20px;
    }

    .buttons{
        gap:12px;
    }

    button{
        padding:13px 26px;
        font-size:16px;
    }
}
</style>
</head>

<body>

<a href="../index.html" class="home-btn">🏠 Home</a>

<div class="card" id="questionPage">
    <div class="badge">100% Real Scientific Survey</div>

    <h1>Are you gay? 🤨</h1>

    <p class="subtitle">
        Choose carefully. Every answer will be permanently judged by absolutely nobody.
    </p>

    <div class="buttons">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <div class="progress-box">
        <div class="progress-text" id="progressText">
            Truth meter: 0%
        </div>

        <div class="progress">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="warning" id="warning"></div>
</div>

<div class="card success" id="successPage">
    <div class="emoji">🎉</div>

    <h1>Congratulations!</h1>

    <p>
        You finally accepted the truth.<br><br>
        The survey has concluded that you are
        <b>brave, honest, and slightly suspicious</b>. 💀😂
    </p>

    <button class="restart" onclick="location.reload()">
        Play Again
    </button>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const questionPage = document.getElementById("questionPage");
const successPage = document.getElementById("successPage");
const warning = document.getElementById("warning");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");

let noClicks = 0;
let yesScale = 1;
let noScale = 1;

const messages = [
    "Nice try 😏",
    "The truth meter is rising...",
    "Bro is fighting the algorithm 💀",
    "Wrong answer detected 😂",
    "No button losing power...",
    "Resistance is becoming embarrassing.",
    "The Yes button is evolving.",
    "Final warning. Choose wisely 👀"
];

function isDesktop(){
    return window.innerWidth > 768;
}

function moveNoButton(){
    if(!isDesktop()) return;

    const padding = 20;

    noBtn.style.position = "fixed";

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const randomX = Math.max(padding, Math.random() * maxX);
    const randomY = Math.max(padding, Math.random() * maxY);

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

noBtn.addEventListener("mouseover", moveNoButton);

noBtn.addEventListener("click", () => {
    noClicks++;

    yesScale += 0.25;
    noScale -= 0.06;

    if(noScale < 0.35){
        noScale = 0.35;
    }

    const progress = Math.min(noClicks * 14, 100);

    yesBtn.style.transform = `scale(${yesScale})`;
    noBtn.style.transform = `scale(${noScale})`;

    progressText.innerText = `Truth meter: ${progress}%`;
    progressFill.style.width = progress + "%";

    warning.innerText = messages[Math.min(noClicks - 1, messages.length - 1)];

    if(noClicks >= 8){
        yesBtn.style.position = "fixed";
        yesBtn.style.left = "50%";
        yesBtn.style.top = "50%";
        yesBtn.style.transform = "translate(-50%, -50%) scale(4)";
        yesBtn.style.zIndex = "999";
        noBtn.style.display = "none";
        warning.innerText = "There is only one answer now 💀";
    }
});

yesBtn.addEventListener("click", () => {
    questionPage.style.display = "none";
    successPage.style.display = "block";
});
</script>

</body>
</html>
