<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Important Question</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Inter, Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        radial-gradient(circle at top left, #ff7eb3, transparent 35%),
        radial-gradient(circle at bottom right, #7afcff, transparent 35%),
        linear-gradient(135deg, #111827, #1f2937);
    overflow: hidden;
    padding: 20px;
    color: white;
}

.card {
    width: 100%;
    max-width: 430px;
    padding: 35px 25px;
    border-radius: 28px;
    text-align: center;
    background: rgba(255, 255, 255, 0.13);
    backdrop-filter: blur(18px);
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.18);
}

.badge {
    display: inline-block;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    margin-bottom: 22px;
    background: rgba(255, 255, 255, 0.18);
}

h1 {
    font-size: clamp(2rem, 8vw, 3.5rem);
    margin-bottom: 12px;
}

.subtitle {
    color: #d1d5db;
    font-size: 15px;
    margin-bottom: 35px;
}

.buttons {
    position: relative;
    display: flex;
    justify-content: center;
    gap: 18px;
    min-height: 130px;
    align-items: center;
}

button {
    border: none;
    cursor: pointer;
    padding: 15px 34px;
    font-size: 18px;
    border-radius: 999px;
    font-weight: 700;
    transition: 0.25s ease;
}

#yesBtn {
    background: linear-gradient(135deg, #22c55e, #86efac);
    color: #052e16;
    box-shadow: 0 10px 30px rgba(34, 197, 94, 0.45);
    z-index: 2;
}

#noBtn {
    background: rgba(255, 255, 255, 0.14);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.25);
    z-index: 3;
}

#noBtn:active,
#yesBtn:active {
    transform: scale(0.96);
}

.success-page {
    display: none;
}

.success-page h1 {
    color: #86efac;
}

.success-page p {
    font-size: 18px;
    line-height: 1.6;
    color: #e5e7eb;
    margin-top: 20px;
}

.emoji {
    font-size: 55px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="card" id="questionPage">
    <div class="badge">Very serious survey</div>

    <h1>Are you gay? 🤨</h1>

    <p class="subtitle">
        Choose wisely. The button knows the truth.
    </p>

    <div class="buttons">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>
</div>

<div class="card success-page" id="successPage">
    <div class="emoji">🎉</div>
    <h1>Congratulations!</h1>
    <p>
        You tried to deny it...<br>
        but the truth finally won. 💀😂<br><br>
        Thank you for completing this very scientific survey.
    </p>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const questionPage = document.getElementById("questionPage");
const successPage = document.getElementById("successPage");

let yesScale = 1;
let noScale = 1;
let noClicks = 0;

function isMobile() {
    return window.innerWidth < 768;
}

function moveNoButton() {
    const padding = 15;

    noBtn.style.position = "fixed";

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const randomX = Math.max(padding, Math.random() * maxX);
    const randomY = Math.max(padding, Math.random() * maxY);

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

if (!isMobile()) {
    noBtn.addEventListener("mouseover", moveNoButton);
}

noBtn.addEventListener("click", () => {
    noClicks++;

    yesScale += 0.3;
    yesBtn.style.transform = `scale(${yesScale})`;

    noScale -= 0.07;

    if (noScale < 0.35) {
        noScale = 0.35;
    }

    noBtn.style.transform = `scale(${noScale})`;

    const messages = [
        "Nice try 😏",
        "Still no? 🤨",
        "Think again 👀",
        "Wrong answer 😂",
        "Try Yes instead 💚",
        "No is shrinking 💀"
    ];

    noBtn.innerText =
        messages[Math.min(noClicks - 1, messages.length - 1)];

    if (noClicks >= 7) {
        yesBtn.style.position = "fixed";
        yesBtn.style.left = "50%";
        yesBtn.style.top = "50%";
        yesBtn.style.transform = "translate(-50%, -50%) scale(4)";
    }
});

yesBtn.addEventListener("click", () => {
    questionPage.style.display = "none";
    successPage.style.display = "block";
});
</script>

</body>
</html>
